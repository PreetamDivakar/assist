<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium Dark Purple Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2E1065"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    
    <!-- Vibrantly Funky 'A' Gradient -->
    <linearGradient id="a_grad" x1="100" y1="100" x2="412" y2="412" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D946EF"/> <!-- Fuchsia 500 -->
      <stop offset="1" stop-color="#8B5CF6"/> <!-- Violet 500 -->
    </linearGradient>
  </defs>

  <!-- Squircle Base -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  
  <!-- Clear Geometric 'A' Shape -->
  <g>
    <!-- Main A Body -->
    <path d="M256 100L420 420H345L256 230L167 420H92L256 100Z" fill="url(#a_grad)"/>
    <!-- Sleek Horizontal Bar -->
    <rect x="195" y="295" width="122" height="40" rx="20" fill="white" fill-opacity="0.95"/>
  </g>

  <!-- Sharp Accents -->
  <circle cx="420" cy="90" r="15" fill="white" fill-opacity="0.8"/>
  <circle cx="90" cy="420" r="10" fill="#D946EF"/>
</svg>
